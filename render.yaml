services:
  - type: web
    name: bigpaw-kennel
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bigpaw-kennel-db
          property: connectionString
      - key: SUPER_ADMIN_EMAIL
        value: admin@bigpaw.com
      - key: SUPER_ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://example.com
      - key: AUTH_RATE_LIMIT_WINDOW_SECONDS
        value: "300"
      - key: AUTH_RATE_LIMIT_MAX_ATTEMPTS
        value: "8"
      - key: AUTH_RATE_LIMIT_BLOCK_SECONDS
        value: "600"

databases:
  - name: bigpaw-kennel-db
    databaseName: bigpaw_kennel
    plan: free
