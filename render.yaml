services:
  - type: web
    name: bigpaw-kennel
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python server.py"
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bigpaw-kennel-db
          property: connectionString

databases:
  - name: bigpaw-kennel-db
    databaseName: bigpaw_kennel
    plan: free
